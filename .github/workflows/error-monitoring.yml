name: Error Monitoring & Auto-Issue Creation

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  monitor-errors:
    name: Monitor Application Errors
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Check application health
      id: health-check
      run: |
        # Check if the application is responding
        HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aftermint-marketplace.vercel.app/ || echo "000")
        echo "status=$HEALTH_STATUS" >> $GITHUB_OUTPUT
        
        if [ "$HEALTH_STATUS" != "200" ]; then
          echo "error=Application is down or not responding (Status: $HEALTH_STATUS)" >> $GITHUB_OUTPUT
        fi

    - name: Check console errors via Lighthouse
      id: lighthouse-errors
      run: |
        npx lighthouse https://aftermint-marketplace.vercel.app/ \
          --chrome-flags="--headless --no-sandbox" \
          --output=json \
          --output-path=/tmp/lighthouse-report.json \
          --only-categories=best-practices || true
        
        # Extract console errors if any
        if [ -f /tmp/lighthouse-report.json ]; then
          ERROR_COUNT=$(cat /tmp/lighthouse-report.json | jq '.audits."errors-in-console".details.items | length' 2>/dev/null || echo "0")
          echo "console_errors=$ERROR_COUNT" >> $GITHUB_OUTPUT
        fi

    - name: Create issue for critical errors
      if: steps.health-check.outputs.status != '200' || steps.lighthouse-errors.outputs.console_errors > '5'
      uses: actions/github-script@v7
      with:
        script: |
          const { status, error } = ${{ toJSON(steps.health-check.outputs) }};
          const consoleErrors = '${{ steps.lighthouse-errors.outputs.console_errors }}';
          
          const title = `🚨 Critical Error Detected - ${new Date().toISOString()}`;
          const body = `
          ## Error Report
          
          **Timestamp**: ${new Date().toISOString()}
          **Health Status**: ${status}
          **Console Errors**: ${consoleErrors}
          
          ### Issues Detected:
          ${error ? `- Application Health: ${error}` : ''}
          ${consoleErrors > 5 ? `- Console Errors: ${consoleErrors} errors detected` : ''}
          
          ### Next Steps:
          1. Check the error tracker on the live site
          2. Review recent commits for breaking changes  
          3. Check Vercel deployment logs
          4. Test locally to reproduce the issue
          
          **Auto-generated by Error Monitoring workflow**
          `;
          
          // Check if a similar issue already exists
          const existingIssues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'auto-detected,critical'
          });
          
          // Only create if no recent auto-detected issues exist
          if (existingIssues.data.length === 0) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['auto-detected', 'critical', 'bug']
            });
          }

  performance-monitoring:
    name: Monitor Performance Metrics
    runs-on: ubuntu-latest

    steps:
    - name: Performance audit
      run: |
        npx lighthouse https://aftermint-marketplace.vercel.app/ \
          --chrome-flags="--headless --no-sandbox" \
          --output=json \
          --output-path=/tmp/performance-report.json \
          --only-categories=performance

    - name: Extract performance metrics
      run: |
        if [ -f /tmp/performance-report.json ]; then
          PERFORMANCE_SCORE=$(cat /tmp/performance-report.json | jq '.categories.performance.score * 100' 2>/dev/null || echo "0")
          FCP=$(cat /tmp/performance-report.json | jq '.audits."first-contentful-paint".numericValue' 2>/dev/null || echo "0")
          LCP=$(cat /tmp/performance-report.json | jq '.audits."largest-contentful-paint".numericValue' 2>/dev/null || echo "0")
          
          echo "Performance Score: $PERFORMANCE_SCORE"
          echo "First Contentful Paint: ${FCP}ms"
          echo "Largest Contentful Paint: ${LCP}ms"
        fi 